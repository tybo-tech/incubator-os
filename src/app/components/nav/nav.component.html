<aside
  [ngClass]="isCollapsed ? 'w-16' : 'w-64'"
  class="bg-slate-900 text-white flex flex-col h-screen transition-all duration-300 ease-in-out overflow-hidden">

  <!-- Logo / Brand Header -->
  <div class="border-b border-slate-700 flex items-center h-16 px-3 flex-shrink-0"
       [class.justify-between]="!isCollapsed"
       [class.justify-center]="isCollapsed">

    <div class="flex items-center min-w-0" [class.space-x-3]="!isCollapsed">
      <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center flex-shrink-0">
        <i class="fas fa-building text-white text-sm"></i>
      </div>
      <span *ngIf="!isCollapsed" class="text-lg font-semibold whitespace-nowrap">incubator-os</span>
    </div>

    <!-- Desktop collapse toggle -->
    <button (click)="toggleCollapse()"
            [title]="isCollapsed ? 'Expand sidebar' : 'Collapse sidebar'"
            class="hidden md:flex items-center justify-center w-7 h-7 rounded-md text-slate-400 hover:text-white hover:bg-slate-700 transition-colors flex-shrink-0">
      <i [class]="isCollapsed ? 'fas fa-angles-right text-sm' : 'fas fa-angles-left text-sm'"></i>
    </button>
  </div>

  <!-- Search Bar (visible only when expanded, hidden on mobile) -->
  <div *ngIf="!isCollapsed" class="hidden md:block p-4 flex-shrink-0">
    <div class="relative">
      <i class="fas fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
      <input type="text" placeholder="Search"
        class="w-full bg-slate-800 border border-slate-700 rounded-lg pl-10 pr-4 py-2 text-sm
               focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
               placeholder-slate-400"/>
    </div>
  </div>

  <!-- Navigation Menu -->
  <nav class="flex-1 pb-4 overflow-y-auto"
       [ngClass]="isCollapsed ? 'px-2 pt-3' : 'px-3 md:px-4'">
    <ul class="space-y-1">
      <li *ngFor="let item of navItems">
        <a [routerLink]="item.route"
           routerLinkActive="bg-slate-800 text-white"
           [routerLinkActiveOptions]="{ exact: item.route === '/' }"
           [title]="isCollapsed ? item.label : ''"
           class="flex items-center px-3 py-2 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition-colors group"
           [class.justify-center]="isCollapsed"
           [class.space-x-3]="!isCollapsed">

          <i [class]="'fas ' + item.icon + ' w-5 text-center flex-shrink-0'"></i>

          <span *ngIf="!isCollapsed" class="flex-1 truncate whitespace-nowrap">{{ item.label }}</span>

          <span *ngIf="item.badge && !isCollapsed"
                class="ml-auto bg-blue-600 text-white text-xs font-medium px-2 py-1 rounded-full min-w-[1.25rem] text-center">
            {{ item.badge }}
          </span>
        </a>
      </li>
    </ul>

    <!-- Mobile Quick Actions (only on mobile, only when nav is open/expanded) -->
    <div *ngIf="!isCollapsed" class="mt-6 pt-4 border-t border-slate-700 md:hidden">
      <button (click)="onNavAction('quickTask')"
              class="w-full flex items-center space-x-3 px-3 py-3 text-slate-300 hover:bg-slate-800 hover:text-white transition-colors rounded-lg">
        <i class="fas fa-plus w-5 text-center flex-shrink-0"></i>
        <span>Quick Task</span>
      </button>
    </div>
  </nav>

  <!-- User / Logout footer -->
  <div class="border-t border-slate-700 p-3 flex-shrink-0">
    <button (click)="onNavAction('logout')"
            title="Sign out"
            class="w-full flex items-center rounded-lg px-2 py-2 text-slate-400 hover:text-white hover:bg-slate-800 transition-colors"
            [class.justify-center]="isCollapsed"
            [class.gap-3]="!isCollapsed">
      <i class="fas fa-right-from-bracket w-5 text-center flex-shrink-0 text-sm"></i>
      <ng-container *ngIf="!isCollapsed">
        <div class="min-w-0 flex-1 text-left">
          <p class="text-xs font-medium text-slate-200 truncate">
            {{ auth.currentUser()?.full_name || auth.currentUser()?.username || 'User' }}
          </p>
          <p class="text-[10px] text-slate-500">Sign out</p>
        </div>
      </ng-container>
    </button>
  </div>
</aside>
